<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Dieline → 3D Box</title>
</head>

<body>

    <div class="title-section">
        <h1>📦 2D Dieline to 3D Box Converter</h1>
        <p>Convert flat packaging dielines into interactive 3D box models</p>
    </div>

    <div id="container"></div>

    <div id="toolbar">

        <input
            type="file"
            id="fileInput"
            accept="image/png,image/jpeg,image/jpg">

        <button id="foldBtn">
            Fold Box
        </button>

    </div>

    <script type="module" src="/src/main.js"></script>

</body>

</html>
